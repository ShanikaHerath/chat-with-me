<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b12" />
      <stop offset="100%" stop-color="#121824" />
    </linearGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer circle with border -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="8" />
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#2563eb" stroke-width="2" stroke-opacity="0.5" filter="url(#glow)" />
  
  <!-- Glowing L Logo Symbol -->
  <g filter="url(#glow)">
    <!-- Custom stylized L using paths -->
    <path d="M190 140 C190 130 198 120 208 120 L248 120 C258 120 266 128 266 138 L266 310 L330 310 C341 310 350 319 350 330 L350 360 C350 371 341 380 330 380 L208 380 C198 380 190 372 190 362 Z" fill="url(#accentGrad)" />
    
    <!-- Cyberpunk light slash accents -->
    <path d="M220 180 L250 150" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8" />
    <circle cx="266" cy="380" r="10" fill="#00f2fe" />
  </g>
</svg>